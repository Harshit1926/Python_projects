<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mode Selection</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(-45deg,#0f172a,#1e3a8a,#312e81,#0f172a);
background-size:400% 400%;
animation:bgmove 12s ease infinite;

color:white;
overflow:hidden;

}

@keyframes bgmove{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

/* glass card */

.container{

padding:60px;

border-radius:20px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,0.1);

box-shadow:0 0 25px rgba(0,0,0,0.5);

text-align:center;

animation:float 5s ease-in-out infinite;

}

@keyframes float{

0%{transform:translateY(0px)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0px)}

}

h1{

margin-bottom:40px;
font-weight:500;
letter-spacing:1px;

}

/* buttons */

button{

width:260px;

padding:16px;

margin:18px;

font-size:17px;

border-radius:12px;

cursor:pointer;

border:none;

color:white;

position:relative;

overflow:hidden;

transition:0.35s;

}

/* gradient buttons */

.photo{

background:linear-gradient(135deg,#06b6d4,#3b82f6);

}

.video{

background:linear-gradient(135deg,#f43f5e,#fb7185);

}

button:hover{

transform:translateY(-6px) scale(1.05);

box-shadow:0 10px 35px rgba(0,0,0,0.6);

}

/* light sweep animation */

button::before{

content:"";

position:absolute;

top:0;
left:-100%;

width:100%;
height:100%;

background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.5),
transparent
);

transition:0.6s;

}

button:hover::before{

left:100%;

}

/* click effect */

button:active{

transform:scale(0.95);

}

/* glowing border */

.container:hover{

box-shadow:
0 0 25px #3b82f6,
0 0 60px #3b82f6;

}

</style>
</head>

<body>

<div class="container">

<form action="{{url_for('photovideo')}}" method="post">

<h1>Select your mode</h1>

<button type="submit" name="mode" value="photo" class="photo">
📸 Capture a Photograph
</button>

<br>

<button type="submit" name="mode" value="video" class="video">
🎥 Record a Video
</button>

</form>

</div>

<script>

/* mouse glow effect */

document.addEventListener("mousemove",(e)=>{

let glow=document.createElement("div")

glow.style.position="absolute"
glow.style.left=e.pageX+"px"
glow.style.top=e.pageY+"px"

glow.style.width="8px"
glow.style.height="8px"

glow.style.background="white"
glow.style.borderRadius="50%"
glow.style.pointerEvents="none"

glow.style.opacity="0.7"

glow.style.boxShadow="0 0 10px white"

document.body.appendChild(glow)

setTimeout(()=>{
glow.remove()
},400)

})

</script>

</body>
</html>
